name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # ── Extraer versión del firmware desde el código fuente ──
      - name: Extraer versión de firmware
        id: version
        run: |
          FW_VER=$(grep -oP '#define\s+FW_VERSION\s+"(\K[^"]+)' src/conway_life.cpp)
          echo "VERSION=${FW_VER}" >> $GITHUB_OUTPUT
          echo "📦 Versión detectada: ${FW_VER}"

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # ── Inyectar versión como flag de compilación ──
      # Esto sobreescribe FW_VERSION en el binario sin tocar el código fuente
      - name: Compilar firmware
        run: |
          pio run -e d1_mini
        env:
          PLATFORMIO_BUILD_FLAGS: -DFW_BUILD_VERSION=\"${{ steps.version.outputs.VERSION }}\"

      # ── Renombrar binario con la versión ──
      - name: Preparar artefactos
        run: |
          mkdir -p release
          cp .pio/build/d1_mini/firmware.bin release/conways_life_v${{ steps.version.outputs.VERSION }}.bin
          echo "Firmware v${{ steps.version.outputs.VERSION }}" > release/version.txt
          echo "Build: $(date -u '+%Y-%m-%d %H:%M UTC')" >> release/version.txt
          echo "Commit: ${{ github.sha }}" >> release/version.txt
          ls -lh release/

      - name: Subir artefacto de firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-v${{ steps.version.outputs.VERSION }}
          path: release/
          retention-days: 90

  # ── Crear release automática al pushear un tag v* ──
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Extraer versión de firmware
        id: version
        run: |
          FW_VER=$(grep -oP '#define\s+FW_VERSION\s+"(\K[^"]+)' src/conway_life.cpp)
          echo "VERSION=${FW_VER}" >> $GITHUB_OUTPUT

      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: firmware-v${{ steps.version.outputs.VERSION }}
          path: release/

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Conway's Life v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🔬 Conway's Game of Life — Firmware v${{ steps.version.outputs.VERSION }}

            ### Instalación
            1. Descarga `conways_life_v${{ steps.version.outputs.VERSION }}.bin`
            2. Flashea con esptool:
               ```
               esptool.py --chip esp8266 --port /dev/ttyUSB0 --baud 921600 write_flash 0x0 conways_life_v${{ steps.version.outputs.VERSION }}.bin
               ```
            3. O actualiza vía OTA desde la interfaz web (Firmware → Actualizar)

            ### Cambios
            Ver [CHANGELOG](https://github.com/wencescarlos/conways_life/commits/main) para detalles.
          files: |
            release/conways_life_v${{ steps.version.outputs.VERSION }}.bin
            release/version.txt
          draft: false
          prerelease: false
