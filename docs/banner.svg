    <rect x="21" y="41" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="31" y="41" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="41" y="41" width="8" height="8" rx="1" fill="#00ff88"/>
    
    <!-- R-pentomino fragment -->
    <rect x="81" y="71" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="91" y="71" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="71" y="81" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="81" y="81" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="81" y="91" width="8" height="8" rx="1" fill="#00ff88"/>

