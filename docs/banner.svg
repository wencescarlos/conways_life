    <line x1="60" y1="0" x2="60" y2="300"/><line x1="70" y1="0" x2="70" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="90" y1="0" x2="90" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="300"/><line x1="110" y1="0" x2="110" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/><line x1="130" y1="0" x2="130" y2="300"/>
    <line x1="140" y1="0" x2="140" y2="300"/><line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/><line x1="170" y1="0" x2="170" y2="300"/>
    <line x1="180" y1="0" x2="180" y2="300"/><line x1="190" y1="0" x2="190" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/><line x1="210" y1="0" x2="210" y2="300"/>
    <line x1="220" y1="0" x2="220" y2="300"/><line x1="230" y1="0" x2="230" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="250" y1="0" x2="250" y2="300"/>
    <line x1="260" y1="0" x2="260" y2="300"/><line x1="270" y1="0" x2="270" y2="300"/>
