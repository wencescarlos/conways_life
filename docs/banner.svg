    <rect x="191" y="51" width="8" height="8" rx="1" fill="#00ff88" opacity="0.5"/>
    <rect x="21" y="131" width="8" height="8" rx="1" fill="#00ff88" opacity="0.6"/>
    <rect x="31" y="131" width="8" height="8" rx="1" fill="#00ff88" opacity="0.6"/>
    <rect x="111" y="121" width="8" height="8" rx="1" fill="#00ff88" opacity="0.4"/>
    <rect x="51" y="181" width="8" height="8" rx="1" fill="#00ff88" opacity="0.5"/>
    <rect x="61" y="191" width="8" height="8" rx="1" fill="#00ff88" opacity="0.5"/>
    <rect x="171" y="161" width="8" height="8" rx="1" fill="#00ff88" opacity="0.3"/>
    <rect x="201" y="101" width="8" height="8" rx="1" fill="#00ff88" opacity="0.3"/>
    <rect x="231" y="191" width="8" height="8" rx="1" fill="#00ff88" opacity="0.4"/>

    <!-- Newborn cells (brighter) -->
