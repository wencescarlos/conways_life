    <line x1="660" y1="0" x2="660" y2="300"/><line x1="670" y1="0" x2="670" y2="300"/>
    <line x1="680" y1="0" x2="680" y2="300"/><line x1="690" y1="0" x2="690" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/><line x1="710" y1="0" x2="710" y2="300"/>
    <line x1="720" y1="0" x2="720" y2="300"/><line x1="730" y1="0" x2="730" y2="300"/>
    <line x1="740" y1="0" x2="740" y2="300"/><line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="760" y1="0" x2="760" y2="300"/><line x1="770" y1="0" x2="770" y2="300"/>
    <line x1="780" y1="0" x2="780" y2="300"/><line x1="790" y1="0" x2="790" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/><line x1="810" y1="0" x2="810" y2="300"/>
    <line x1="820" y1="0" x2="820" y2="300"/><line x1="830" y1="0" x2="830" y2="300"/>
    <line x1="840" y1="0" x2="840" y2="300"/><line x1="850" y1="0" x2="850" y2="300"/>
    <line x1="860" y1="0" x2="860" y2="300"/><line x1="870" y1="0" x2="870" y2="300"/>
    <line x1="880" y1="0" x2="880" y2="300"/><line x1="890" y1="0" x2="890" y2="300"/>
