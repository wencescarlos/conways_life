    <rect x="681" y="31" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="641" y="41" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="641" y="51" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="681" y="51" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="641" y="61" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="651" y="61" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="661" y="61" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="671" y="61" width="8" height="8" rx="1" fill="#00ff88"/>

    <!-- Block (still life) -->
    <rect x="781" y="91" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="791" y="91" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="781" y="101" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="791" y="101" width="8" height="8" rx="1" fill="#00ff88"/>

    <!-- Blinker (oscillator) -->
    <rect x="711" y="151" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="721" y="151" width="8" height="8" rx="1" fill="#00ff88"/>
    <rect x="731" y="151" width="8" height="8" rx="1" fill="#00ff88"/>

