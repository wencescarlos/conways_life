  <!-- Subtitle -->
  <text x="450" y="145" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#00ccff" opacity="0.9">ESP8266 + ILI9341 Touchscreen</text>

  <!-- Tagline -->
  <text x="450" y="175" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#666">WebSocket &#x2022; OTA Updates &#x2022; RLE Patterns &#x2022; 20 Themes &#x2022; Captive Portal</text>

  <!-- GitHub reference -->
  <text x="450" y="210" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#00ff88" opacity="0.6">github.com/wencescarlos/conways_life</text>

  <!-- Bottom border glow -->
