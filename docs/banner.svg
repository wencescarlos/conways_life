    <rect x="751" y="51" width="8" height="8" rx="1" fill="#00ff88" opacity="0.4"/>
    <rect x="831" y="181" width="8" height="8" rx="1" fill="#00ff88" opacity="0.5"/>
    <rect x="841" y="191" width="8" height="8" rx="1" fill="#00ff88" opacity="0.5"/>
    <rect x="671" y="201" width="8" height="8" rx="1" fill="#00ff88" opacity="0.3"/>
    <rect x="761" y="231" width="8" height="8" rx="1" fill="#00ff88" opacity="0.4"/>
    <rect x="851" y="51" width="8" height="8" rx="1" fill="#00ff88" opacity="0.3"/>
    <rect x="871" y="261" width="8" height="8" rx="1" fill="#88ffcc" opacity="0.6"/>
    <rect x="631" y="251" width="8" height="8" rx="1" fill="#004422" opacity="0.4"/>
    <rect x="701" y="261" width="8" height="8" rx="1" fill="#004422" opacity="0.3"/>
  </g>

  <!-- Bottom scattered cells (across full width) -->
  <g filter="url(#cellGlow)" opacity="0.6">
    <rect x="311" y="261" width="8" height="8" rx="1" fill="#00ff88" opacity="0.3"/>
    <rect x="401" y="271" width="8" height="8" rx="1" fill="#00ff88" opacity="0.2"/>
    <rect x="501" y="261" width="8" height="8" rx="1" fill="#00ff88" opacity="0.25"/>
    <rect x="351" y="231" width="8" height="8" rx="1" fill="#00ff88" opacity="0.2"/>
    <rect x="551" y="241" width="8" height="8" rx="1" fill="#00ff88" opacity="0.2"/>
    <rect x="271" y="251" width="8" height="8" rx="1" fill="#88ffcc" opacity="0.3"/>
