; ═══════════════════════════════════════════════════════════════
;  PlatformIO Configuration
;  Conway's Game of Life - ESP8266 + ILI9341
; ═══════════════════════════════════════════════════════════════
;
;  Alternative to Arduino IDE. Install PlatformIO, then:
;    pio run -t upload
;    pio device monitor
;

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino

; CPU at 160MHz for better performance
board_build.f_cpu = 160000000L

; Flash config
board_build.flash_mode = dio
board_build.ldscript = eagle.flash.4m2m.ld

; Upload speed
upload_speed = 921600

; Serial monitor
monitor_speed = 115200

; Libraries
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^6.21.5
    links2004/WebSockets@^2.4.1

; TFT_eSPI build flags (replaces User_Setup.h)
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_CS=5
    -DTFT_DC=4
    -DTFT_RST=-1
    -DTOUCH_CS=0
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
